// ─── Algorithm ─────────────────────────────────────────────────────────
function generateRounds(players, courts) {
  const n = players.length;
  const partnerCount = {}, opponentCount = {}, byeCount = {}, lastByeRound = {};
  players.forEach(p => { byeCount[p.id] = 0; lastByeRound[p.id] = -999;
    players.forEach(q => { if (p.id !== q.id) { partnerCount[p.id+"-"+q.id] = 0; opponentCount[p.id+"-"+q.id] = 0; } });
  });
  const allPairs = [];
  for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) allPairs.push([players[i].id, players[j].id]);
  const pairsPerRound = Math.min(courts.length, Math.floor(n / 4)) * 2;
  const maxRounds = pairsPerRound > 0 ? Math.ceil(allPairs.length / pairsPerRound) : 1;
  const rounds = [];

  for (let r = 0; r < maxRounds * 3; r++) {
    const activeCourts = Math.min(courts.length, Math.floor(n / 4));
    const activePlayerCount = activeCourts * 4;
    const sortedForBye = [...players].sort((a, b) => {
      const aC = lastByeRound[a.id] === r - 1 ? 1 : 0, bC = lastByeRound[b.id] === r - 1 ? 1 : 0;
      if (aC !== bC) return bC - aC;
      if (byeCount[a.id] !== byeCount[b.id]) return byeCount[b.id] - byeCount[a.id];
      return Math.random() - 0.5;
    });
    const activePlayers = sortedForBye.slice(0, activePlayerCount);
    const byePlayers = sortedForBye.slice(activePlayerCount);
    byePlayers.forEach(p => { byeCount[p.id]++; lastByeRound[p.id] = r; });
    const usedInRound = new Set(), matches = [];

    for (let c = 0; c < activeCourts; c++) {
      const available = activePlayers.filter(p => !usedInRound.has(p.id));
      if (available.length < 4) break;
      let bestMatch = null, bestScore = Infinity;
      const combos = [];
      if (available.length <= 8) {
        for (let a = 0; a < available.length; a++) for (let b = a+1; b < available.length; b++)
          for (let cc = b+1; cc < available.length; cc++) for (let d = cc+1; d < available.length; d++)
            combos.push([available[a], available[b], available[cc], available[d]]);
      } else {
        const seen = new Set();
        for (let att = 0; att < 300; att++) {
          const sh = [...available].sort(() => Math.random() - 0.5);
          const four = sh.slice(0, 4).sort((x, y) => x.id.localeCompare(y.id));
          const key = four.map(p => p.id).join(",");
          if (!seen.has(key)) { seen.add(key); combos.push(four); }
        }
      }
      for (const four of combos) {
        const splits = [[[four[0],four[1]],[four[2],four[3]]],[[four[0],four[2]],[four[1],four[3]]],[[four[0],four[3]],[four[1],four[2]]]];
        for (const [t1, t2] of splits) {
          const pk = (a,b) => a.id+"-"+b.id;
          const ps = (partnerCount[pk(t1[0],t1[1])]||0)+(partnerCount[pk(t1[1],t1[0])]||0)+(partnerCount[pk(t2[0],t2[1])]||0)+(partnerCount[pk(t2[1],t2[0])]||0);
          const opp = [pk(t1[0],t2[0]),pk(t1[0],t2[1]),pk(t1[1],t2[0]),pk(t1[1],t2[1])];
          const os = opp.reduce((s,k) => s+(opponentCount[k]||0)+(opponentCount[k.split("-").reverse().join("-")]||0), 0);
          const sc = ps*3+os;
          if (sc < bestScore) { bestScore = sc; bestMatch = { team1: t1, team2: t2, court: courts[c] }; }
        }
      }
      if (bestMatch) {
        matches.push(bestMatch);
        bestMatch.team1.forEach(p => usedInRound.add(p.id));
        bestMatch.team2.forEach(p => usedInRound.add(p.id));
        const { team1: t1, team2: t2 } = bestMatch;
        const inc = (o,a,b) => { o[a.id+"-"+b.id]=(o[a.id+"-"+b.id]||0)+1; o[b.id+"-"+a.id]=(o[b.id+"-"+a.id]||0)+1; };
        inc(partnerCount, t1[0], t1[1]); inc(partnerCount, t2[0], t2[1]);
        t1.forEach(a => t2.forEach(b => inc(opponentCount, a, b)));
      }
    }
    if (matches.length === 0) break;
    rounds.push({
      id: generateId(), number: rounds.length + 1,
      matches: matches.map(m => ({ id: generateId(), court: m.court, team1: m.team1.map(p => ({id:p.id,name:p.name})), team2: m.team2.map(p => ({id:p.id,name:p.name})), score1: null, score2: null, completed: false })),
      byePlayers: byePlayers.map(p => ({id:p.id,name:p.name})), completed: false,
    });
    const allPartnered = allPairs.every(([a,b]) => (partnerCount[a+"-"+b]||0)+(partnerCount[b+"-"+a]||0) > 0);
    if (allPartnered && rounds.length >= Math.ceil(n/2)) break;
    if (rounds.length >= maxRounds) break;
  }
  return rounds;
}

// ─── Persistence (localStorage) ────────────────────────────────────────
function saveData(data) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {} }
function loadData() { try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : null; } catch(e) { return null; } }
function clearData() { try { localStorage.removeItem(STORAGE_KEY); } catch(e) {} }

// ─── Score Modal ───────────────────────────────────────────────────────
function ScoreModal({ match, maxPoints, onSubmit, onClose, teamHint }) {
  const selectedTeam = teamHint;
  const balls = Array.from({ length: maxPoints + 1 }, (_, i) => i);
  const team1Names = match.team1.map(p => p.name).join(" & ");
  const team2Names = match.team2.map(p => p.name).join(" & ");
  const handleBallClick = (val) => { onSubmit(selectedTeam === 1 ? val : maxPoints - val); };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,20,20,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}} onClick={onClose}>
      <div style={{background:P.mid,borderRadius:16,border:"1px solid "+P.borderHi,padding:24,maxWidth:480,width:"100%",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{fontSize:12,fontWeight:700,color:P.dim,textTransform:"uppercase",letterSpacing:1.5}}>{match.court.name}</span>
          <button style={{background:"none",border:"none",color:P.dim,cursor:"pointer",padding:4,display:"flex"}} onClick={onClose}><IconX/></button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
          <div style={{flex:1,padding:12,borderRadius:10,border:"2px solid "+(selectedTeam===1?P.olive:P.border),background:selectedTeam===1?"rgba(148,180,135,0.12)":P.card,textAlign:"center",opacity:selectedTeam===1?1:0.4}}>
            <span style={{display:"block",fontSize:14,fontWeight:700}}>{team1Names}</span>
          </div>
          <span style={{fontSize:12,color:P.dim,fontWeight:700}}>vs</span>
          <div style={{flex:1,padding:12,borderRadius:10,border:"2px solid "+(selectedTeam===2?P.olive:P.border),background:selectedTeam===2?"rgba(148,180,135,0.12)":P.card,textAlign:"center",opacity:selectedTeam===2?1:0.4}}>
            <span style={{display:"block",fontSize:14,fontWeight:700}}>{team2Names}</span>
          </div>
        </div>
        <p style={{fontSize:13,color:P.dim,marginBottom:12}}>Punkty dla <strong style={{color:"#fff"}}>{selectedTeam===1?team1Names:team2Names}</strong>:</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
          {balls.map(val => (
            <button key={val} className="ball" onClick={()=>handleBallClick(val)}
              style={{width:46,height:46,borderRadius:"50%",border:"2px solid "+P.border,background:P.card,color:"#fff",fontSize:15,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all 0.1s",fontVariantNumeric:"tabular-nums"}}>
              {val}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Main App ──────────────────────────────────────────────────────────
function App() {
  const [phase, setPhase] = useState("loading");
  const [tournament, setTournament] = useState(null);
  const [setupData, setSetupData] = useState({ name: "", players: [], courts: [{ id: generateId(), name: "Kort 1" }], maxPoints: "32", byePoints: "0" });
  const [newPlayerName, setNewPlayerName] = useState("");
  const [scoreModal, setScoreModal] = useState(null);
  const playerInputRef = useRef(null);
  const numVal = v => { const n = parseInt(v); return isNaN(n) ? 0 : n; };

  useEffect(() => {
    const saved = loadData();
    if (saved && saved.phase) {
      if (saved.phase === "tournament" || saved.phase === "finished") { setTournament(saved); setPhase(saved.phase); }
      else { if (saved.setupData) setSetupData(saved.setupData); setPhase("setup"); }
    } else { setPhase("setup"); }
  }, []);

  useEffect(() => {
    if (phase === "loading") return;
    if (phase === "setup") saveData({ phase: "setup", setupData });
    else if (tournament) saveData({ ...tournament, phase });
  }, [phase, setupData, tournament]);

  const addPlayer = () => { const name = newPlayerName.trim(); if (!name) return; setSetupData(d => ({...d, players: [...d.players, {id:generateId(),name}]})); setNewPlayerName(""); setTimeout(()=>playerInputRef.current?.focus(),50); };
  const removePlayer = id => setSetupData(d => ({...d, players: d.players.filter(p=>p.id!==id)}));
  const addCourt = () => setSetupData(d => ({...d, courts: [...d.courts, {id:generateId(),name:"Kort "+(d.courts.length+1)}]}));
  const removeCourt = id => setSetupData(d => ({...d, courts: d.courts.filter(c=>c.id!==id)}));
  const updateCourtName = (id,name) => setSetupData(d => ({...d, courts: d.courts.map(c=>c.id===id?{...c,name}:c)}));
  const canStart = setupData.players.length >= 4 && setupData.courts.length >= 1 && numVal(setupData.maxPoints) > 0;

  const startTournament = () => {
    if (!canStart) return;
    const rounds = generateRounds(setupData.players, setupData.courts);
    const mp = numVal(setupData.maxPoints), bp = numVal(setupData.byePoints);
    const t = { phase:"tournament", name: setupData.name||"Turniej Americano", players: deepClone(setupData.players), courts: deepClone(setupData.courts), maxPoints:mp, byePoints:bp, rounds, scores:{}, stats:{}, currentRound:0 };
    setupData.players.forEach(p => { t.scores[p.id]=0; t.stats[p.id]={w:0,d:0,l:0}; });
    setTournament(t); setPhase("tournament");
  };

  const openScoreModal = (ri, mi, teamHint) => {
    const match = tournament.rounds[ri].matches[mi];
    if (phase === "finished") return;
    if (match.completed) { resetScoreAndOpen(ri, mi, teamHint); return; }
    setScoreModal({ roundIdx:ri, matchIdx:mi, match, teamHint });
  };

  const resetScoreAndOpen = (ri, mi, teamHint) => {
    setTournament(prev => {
      const t = deepClone(prev); const match = t.rounds[ri].matches[mi];
      if (!match.completed) return t;
      const s1=match.score1, s2=match.score2;
      match.team1.forEach(p => t.scores[p.id]-=s1); match.team2.forEach(p => t.scores[p.id]-=s2);
      if(s1>s2){match.team1.forEach(p=>t.stats[p.id].w--);match.team2.forEach(p=>t.stats[p.id].l--);}
      else if(s2>s1){match.team2.forEach(p=>t.stats[p.id].w--);match.team1.forEach(p=>t.stats[p.id].l--);}
      else{match.team1.forEach(p=>t.stats[p.id].d--);match.team2.forEach(p=>t.stats[p.id].d--);}
      const round = t.rounds[ri];
      if(round.completed) round.byePlayers.forEach(p => t.scores[p.id]-=t.byePoints);
      match.score1=null;match.score2=null;match.completed=false;round.completed=false;
      setTimeout(()=>setScoreModal({roundIdx:ri,matchIdx:mi,match:t.rounds[ri].matches[mi],teamHint}),0);
      return t;
    });
  };

  const submitScore = (score1) => {
    if (!scoreModal) return;
    const { roundIdx:ri, matchIdx:mi } = scoreModal;
    setTournament(prev => {
      const t = deepClone(prev); const match = t.rounds[ri].matches[mi];
      const s1=Math.max(0,Math.min(t.maxPoints,score1)), s2=t.maxPoints-s1;
      match.score1=s1;match.score2=s2;match.completed=true;
      match.team1.forEach(p=>t.scores[p.id]=(t.scores[p.id]||0)+s1);
      match.team2.forEach(p=>t.scores[p.id]=(t.scores[p.id]||0)+s2);
      if(s1>s2){match.team1.forEach(p=>t.stats[p.id].w++);match.team2.forEach(p=>t.stats[p.id].l++);}
      else if(s2>s1){match.team2.forEach(p=>t.stats[p.id].w++);match.team1.forEach(p=>t.stats[p.id].l++);}
      else{match.team1.forEach(p=>t.stats[p.id].d++);match.team2.forEach(p=>t.stats[p.id].d++);}
      const round=t.rounds[ri];
      if(round.matches.every(m=>m.completed)){round.completed=true;round.byePlayers.forEach(p=>t.scores[p.id]=(t.scores[p.id]||0)+t.byePoints);if(ri+1<t.rounds.length)t.currentRound=ri+1;}
      return t;
    });
    setScoreModal(null);
  };

  const finishTournament = () => { setPhase("finished"); setTournament(p=>({...p,phase:"finished"})); };
  const newTournament = () => { clearData(); setTournament(null); setSetupData({name:"",players:[],courts:[{id:generateId(),name:"Kort 1"}],maxPoints:"32",byePoints:"0"}); setPhase("setup"); };
  const getRanking = () => { if(!tournament)return[]; return tournament.players.map(p=>({...p,points:tournament.scores[p.id]||0,stats:tournament.stats[p.id]||{w:0,d:0,l:0}})).sort((a,b)=>b.points!==a.points?b.points-a.points:b.stats.w-a.stats.w); };

  // Shared styles
  const sInput = {width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid "+P.border,background:P.mid,color:P.text,fontSize:15,outline:"none",boxSizing:"border-box",marginBottom:8};
  const sLabel = {display:"block",fontSize:11,fontWeight:600,color:P.dim,marginBottom:8,textTransform:"uppercase",letterSpacing:1.5};

  if (phase === "loading") return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh"}}><LogoSmall width={48}/><p style={{marginTop:16,fontSize:14,color:P.dim,fontFamily:"monospace"}}>Ładowanie...</p></div>;

  // ── Setup ──
  if (phase === "setup") {
    return (
      <div style={{minHeight:"100vh"}}>
        <div style={{maxWidth:560,margin:"0 auto",padding:"40px 20px"}}>
          <div style={{textAlign:"center",marginBottom:28}}>
            <GardenLogo width={200} />
            <div style={{height:24}}/>
            <h2 style={{fontSize:15,fontWeight:300,color:P.dim,letterSpacing:5,textTransform:"uppercase"}}>Turniej Americano</h2>
          </div>
          <div style={{marginBottom:24}}><label style={sLabel}>Nazwa turnieju</label><input style={sInput} value={setupData.name} onChange={e=>setSetupData(d=>({...d,name:e.target.value}))} placeholder="np. Turniej Weekendowy"/></div>
          <div style={{display:"flex",gap:12,marginBottom:24}}>
            <div style={{flex:1}}><label style={sLabel}>Punkty w meczu</label><input style={sInput} type="number" min="1" value={setupData.maxPoints} onChange={e=>setSetupData(d=>({...d,maxPoints:e.target.value}))}/></div>
            <div style={{flex:1}}><label style={sLabel}>Punkty za pauzę</label><input style={sInput} type="number" min="0" value={setupData.byePoints} onChange={e=>setSetupData(d=>({...d,byePoints:e.target.value}))}/></div>
          </div>
          <div style={{marginBottom:24}}>
            <label style={sLabel}>Gracze ({setupData.players.length})</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:10}}>
              {setupData.players.map(p => <div key={p.id} style={{display:"flex",alignItems:"center",gap:6,background:P.card,border:"1px solid "+P.border,borderRadius:20,padding:"6px 14px",fontSize:14}}><span>{p.name}</span><button style={{background:"none",border:"none",color:P.dim,cursor:"pointer",padding:0,display:"flex"}} onClick={()=>removePlayer(p.id)}><IconX/></button></div>)}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input ref={playerInputRef} style={{...sInput,flex:1,marginBottom:0}} value={newPlayerName} onChange={e=>setNewPlayerName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPlayer()} placeholder="Imię gracza"/>
              <button style={{display:"flex",alignItems:"center",gap:6,padding:"10px 18px",background:P.olive,color:P.dark,border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}} onClick={addPlayer}><IconPlus/> Dodaj</button>
            </div>
            {setupData.players.length>0&&setupData.players.length<4&&<p style={{color:P.olive,fontSize:12,marginTop:4}}>Minimum 4 graczy</p>}
          </div>
          <div style={{marginBottom:24}}>
            <label style={sLabel}>Korty ({setupData.courts.length})</label>
            {setupData.courts.map(c => <div key={c.id} style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}><input style={{...sInput,flex:1,marginBottom:0}} value={c.name} onChange={e=>updateCourtName(c.id,e.target.value)}/>{setupData.courts.length>1&&<button style={{background:"none",border:"none",color:P.dim,cursor:"pointer",padding:4,display:"flex"}} onClick={()=>removeCourt(c.id)}><IconX/></button>}</div>)}
            <button style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",background:"transparent",color:P.olive,border:"1px dashed "+P.olive,borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",marginTop:8}} onClick={addCourt}><IconPlus/> Dodaj kort</button>
          </div>
          <button style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"14px 24px",background:"linear-gradient(135deg,"+P.olive+","+P.oliveDark+")",color:P.dark,border:"none",borderRadius:12,fontSize:17,fontWeight:800,cursor:canStart?"pointer":"not-allowed",opacity:canStart?1:0.4}} disabled={!canStart} onClick={startTournament}><IconPlay/> Rozpocznij turniej</button>
        </div>
      </div>
    );
  }

  // ── Tournament / Finished ──
  if ((phase==="tournament"||phase==="finished")&&tournament) {
    const ranking = getRanking();
    const completedRounds = tournament.rounds.filter(r=>r.completed).length;
    const isFinished = phase==="finished";
    return (
      <div style={{minHeight:"100vh"}}>
        {scoreModal && <ScoreModal match={scoreModal.match} maxPoints={tournament.maxPoints} teamHint={scoreModal.teamHint} onSubmit={submitScore} onClose={()=>setScoreModal(null)}/>}
        {/* Top bar */}
        <div style={{background:P.mid,borderBottom:"1px solid "+P.border,padding:"10px 20px",position:"sticky",top:0,zIndex:50}}>
          <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}><LogoSmall width={36}/><span style={{fontSize:15,fontWeight:600}}>{tournament.name}</span></div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:13,color:P.dim,background:P.card,padding:"4px 12px",borderRadius:12,fontWeight:700}}>{completedRounds}/{tournament.rounds.length} rund</span>
              {!isFinished&&<button style={{padding:"6px 16px",background:"#c0392b",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}} onClick={finishTournament}>Zakończ turniej</button>}
              {isFinished&&<button style={{padding:"6px 16px",background:P.olive,color:P.dark,border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}} onClick={newTournament}>Nowy turniej</button>}
            </div>
          </div>
        </div>
        {/* Winner */}
        {isFinished&&ranking.length>0&&(
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,padding:"24px 20px",background:"linear-gradient(135deg,"+P.mid+" 0%,#003d20 100%)",borderBottom:"1px solid "+P.border}}>
            <div style={{fontSize:48}}>🏆</div>
            <div><div style={{fontSize:12,color:P.olive,textTransform:"uppercase",letterSpacing:2,fontWeight:700}}>Zwycięzca</div><div style={{fontSize:28,fontWeight:800,margin:"2px 0",color:"#fff"}}>{ranking[0].name}</div><div style={{fontSize:16,color:P.dim}}>{ranking[0].points} pkt • Z-R-P {ranking[0].stats.w}-{ranking[0].stats.d}-{ranking[0].stats.l}</div></div>
          </div>
        )}
        {/* Grid */}
        <div className="main-grid" style={{maxWidth:1200,margin:"0 auto",padding:20,display:"grid",gridTemplateColumns:"340px 1fr",gap:20,alignItems:"start"}}>
          {/* Ranking */}
          <div style={{background:P.mid,borderRadius:12,border:"1px solid "+P.border,overflow:"hidden"}}>
            <h2 style={{fontSize:12,fontWeight:700,color:P.dim,textTransform:"uppercase",letterSpacing:2,padding:"14px 16px",margin:0,borderBottom:"1px solid "+P.border}}>Ranking</h2>
            <div>
              <div style={{display:"flex",alignItems:"center",padding:"8px 16px",borderBottom:"1px solid "+P.border,fontSize:10,color:P.dim,textTransform:"uppercase",letterSpacing:1.5}}>
                <span style={{width:32,textAlign:"center"}}>#</span><span style={{flex:1}}>Gracz</span><span style={{width:70,textAlign:"center"}}>Z-R-P</span><span style={{width:48,textAlign:"right"}}>Pkt</span>
              </div>
              {ranking.map((p,i) => (
                <div key={p.id} style={{display:"flex",alignItems:"center",padding:"10px 16px",borderBottom:"1px solid "+P.border,...(i===0&&isFinished?{background:"rgba(212,168,67,0.1)"}:i===1&&isFinished?{background:"rgba(148,163,184,0.06)"}:i===2&&isFinished?{background:"rgba(192,138,69,0.06)"}:{})}}>
                  <span style={{width:32,textAlign:"center",fontSize:15,fontWeight:700}}>{i===0&&isFinished?"🥇":i===1&&isFinished?"🥈":i===2&&isFinished?"🥉":i+1}</span>
                  <span style={{flex:1,fontSize:14,fontWeight:600}}>{p.name}</span>
                  <span style={{width:70,textAlign:"center",fontSize:13,fontWeight:700,fontVariantNumeric:"tabular-nums"}}><span style={{color:P.olive}}>{p.stats.w}</span>-<span style={{color:P.dim}}>{p.stats.d}</span>-<span style={{color:"#d46b5b"}}>{p.stats.l}</span></span>
                  <span style={{width:48,textAlign:"right",fontSize:16,fontWeight:800,fontVariantNumeric:"tabular-nums",color:P.olive}}>{p.points}</span>
                </div>
              ))}
            </div>
          </div>
          {/* Rounds */}
          <div style={{background:P.mid,borderRadius:12,border:"1px solid "+P.border,overflow:"hidden"}}>
            <h2 style={{fontSize:12,fontWeight:700,color:P.dim,textTransform:"uppercase",letterSpacing:2,padding:"14px 16px",margin:0,borderBottom:"1px solid "+P.border}}>Rundy</h2>
            <div style={{padding:16,display:"flex",flexDirection:"column",gap:16,maxHeight:"calc(100vh - 140px)",overflowY:"auto"}}>
              {tournament.rounds.map((round,ri) => (
                <div key={round.id} style={{background:P.card,borderRadius:10,border:"1px solid "+(ri===tournament.currentRound&&!isFinished&&!round.completed?P.olive:P.border),padding:14,opacity:round.completed?0.7:1}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                    <span style={{fontSize:15,fontWeight:700}}>Runda {round.number}</span>
                    {round.completed&&<span style={{display:"flex",alignItems:"center",gap:4,fontSize:12,color:P.olive,fontWeight:600}}><IconCheck/> Ukończona</span>}
                    {ri===tournament.currentRound&&!round.completed&&!isFinished&&<span style={{fontSize:12,color:P.dark,fontWeight:700,background:P.olive,padding:"2px 10px",borderRadius:8}}>Trwa</span>}
                  </div>
                  {round.matches.map((match,mi) => {
                    const canClick = !isFinished;
                    const tStyle = (won,lost) => ({flex:1,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",borderRadius:8,border:"1px solid "+P.border,background:P.card,transition:"all 0.15s",...(canClick?{cursor:"pointer"}:{}),...(match.completed?(won?{borderColor:P.olive+"88",background:"rgba(148,180,135,0.1)"}:lost?{borderColor:"#c0392b44",background:"rgba(192,57,43,0.05)"}:{borderColor:"#d4a84366",background:"rgba(212,168,67,0.05)"}):{}),});
                    return (
                      <div key={match.id} style={{background:P.mid,borderRadius:8,padding:12,marginBottom:8,border:"1px solid "+P.border}}>
                        <div style={{fontSize:11,color:P.dim,textTransform:"uppercase",letterSpacing:1,marginBottom:8,fontWeight:700}}>{match.court.name}</div>
                        <div style={{display:"flex",alignItems:"stretch",gap:8}}>
                          <div className={canClick?"team-btn-click":""} style={tStyle(match.score1>match.score2,match.score1<match.score2)} onClick={()=>canClick&&openScoreModal(ri,mi,1)}>
                            <span style={{fontSize:13,fontWeight:600}}>{match.team1.map(p=>p.name).join(" & ")}</span>
                            {match.completed&&<span style={{fontSize:20,fontWeight:800,fontVariantNumeric:"tabular-nums",color:P.olive,marginLeft:8}}>{match.score1}</span>}
                          </div>
                          <span style={{display:"flex",alignItems:"center",fontSize:11,color:P.dim,fontWeight:700}}>vs</span>
                          <div className={canClick?"team-btn-click":""} style={tStyle(match.score2>match.score1,match.score2<match.score1)} onClick={()=>canClick&&openScoreModal(ri,mi,2)}>
                            <span style={{fontSize:13,fontWeight:600}}>{match.team2.map(p=>p.name).join(" & ")}</span>
                            {match.completed&&<span style={{fontSize:20,fontWeight:800,fontVariantNumeric:"tabular-nums",color:P.olive,marginLeft:8}}>{match.score2}</span>}
                          </div>
                        </div>
                        {!match.completed&&!isFinished&&<div style={{fontSize:11,color:P.dim,textAlign:"center",marginTop:6,fontStyle:"italic"}}>Kliknij parę, aby podać wynik</div>}
                      </div>
                    );
                  })}
                  {round.byePlayers.length>0&&(
                    <div style={{marginTop:8,padding:"8px 12px",background:"rgba(148,180,135,0.06)",borderRadius:6,fontSize:13,color:P.dim,border:"1px dashed rgba(148,180,135,0.27)"}}>
                      Pauza: {round.byePlayers.map(p=>p.name).join(", ")}{tournament.byePoints>0&&<span style={{opacity:0.6}}> (+{tournament.byePoints} pkt)</span>}
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
