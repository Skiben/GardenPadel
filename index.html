// ─── ALGORITHM (retry-based, guarantees optimal pairing) ───────────────
function generateRounds(players, courts) {
  const n = players.length;
  const pk = (a,b) => a<b ? a+"|"+b : b+"|"+a;
  const activeCourts = Math.min(courts.length, Math.floor(n/4));
  const activePlayerCount = activeCourts * 4;
  const pairsPerRound = activeCourts * 2;
  const allPairKeys = [];
  for(let i=0;i<n;i++) for(let j=i+1;j<n;j++) allPairKeys.push(pk(players[i].id,players[j].id));
  const maxNeededRounds = pairsPerRound>0 ? Math.ceil(allPairKeys.length/pairsPerRound) : 1;

  let bestResult=null, bestMaxPartner=Infinity;
  const totalAttempts = n<=12?15:8;

  for(let fa=0;fa<totalAttempts;fa++){
    const pc=new Map(), oc=new Map(), bc=new Map(), lbr=new Map();
    players.forEach(p=>{bc.set(p.id,0);lbr.set(p.id,-999)});
    const gpc=(a,b)=>pc.get(pk(a,b))||0;
    const goc=(a,b)=>oc.get(pk(a,b))||0;
    const ipc=(a,b)=>pc.set(pk(a,b),gpc(a,b)+1);
    const ioc=(a,b)=>oc.set(pk(a,b),goc(a,b)+1);
    const rounds=[];

    for(let r=0;r<maxNeededRounds+5;r++){
      const sorted=[...players].sort((a,b)=>{
        const aC=lbr.get(a.id)===r-1?1:0, bC=lbr.get(b.id)===r-1?1:0;
        if(aC!==bC) return bC-aC;
        const aB=bc.get(a.id),bB=bc.get(b.id);
        if(aB!==bB) return bB-aB;
        return Math.random()-0.5;
      });
      const ap=sorted.slice(0,activePlayerCount);
      const bp=sorted.slice(activePlayerCount);
      bp.forEach(p=>{bc.set(p.id,bc.get(p.id)+1);lbr.set(p.id,r)});

      let bestM=null, bestS=Infinity;
      const att=n<=12?2000:800;
      for(let a=0;a<att;a++){
        const sh=[...ap].sort(()=>Math.random()-0.5);
        let ts=0; const ms=[];
        for(let g=0;g<activeCourts;g++){
          const f=sh.slice(g*4,g*4+4);
          const sp=[[f[0],f[1],f[2],f[3]],[f[0],f[2],f[1],f[3]],[f[0],f[3],f[1],f[2]]];
          let bss=Infinity,bt1,bt2;
          for(const[a,b,c,d] of sp){
            const ps=gpc(a.id,b.id)+gpc(c.id,d.id);
            const os=goc(a.id,c.id)+goc(a.id,d.id)+goc(b.id,c.id)+goc(b.id,d.id);
            const sc=ps*ps*50+os*os;
            if(sc<bss){bss=sc;bt1=[a,b];bt2=[c,d]}
          }
          ts+=bss; ms.push({t1:bt1,t2:bt2,court:courts[g]});
        }
        if(ts<bestS){bestS=ts;bestM=ms}
        if(ts===0)break;
      }
      if(!bestM)break;
      for(const m of bestM){ipc(m.t1[0].id,m.t1[1].id);ipc(m.t2[0].id,m.t2[1].id);for(const a of m.t1)for(const b of m.t2)ioc(a.id,b.id)}
      rounds.push({id:gid(),number:rounds.length+1,
        matches:bestM.map(m=>({id:gid(),court:m.court,team1:m.t1.map(p=>({id:p.id,name:p.name})),team2:m.t2.map(p=>({id:p.id,name:p.name})),score1:null,score2:null,completed:false})),
        byePlayers:bp.map(p=>({id:p.id,name:p.name})),completed:false});
      if(allPairKeys.every(k=>(pc.get(k)||0)>0))break;
      if(rounds.length>=maxNeededRounds+3)break;
    }
    let mx=0; for(const[,c] of pc) if(c>mx) mx=c;
    if(mx<bestMaxPartner){bestMaxPartner=mx;bestResult=rounds;if(mx<=1)break}
  }
  return bestResult||[];
}

// ─── Score Modal ───────────────────────────────────────────────────────
function ScoreModal({match,maxPoints,onSubmit,onClose,teamHint}){
  const sel=teamHint;
  const balls=Array.from({length:maxPoints+1},(_,i)=>i);
  const t1n=match.team1.map(p=>p.name).join(" & "), t2n=match.team2.map(p=>p.name).join(" & ");
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,20,20,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}} onClick={onClose}>
      <div style={{background:P.mid,borderRadius:16,border:"1px solid "+P.borderHi,padding:24,maxWidth:480,width:"100%",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{fontSize:12,fontWeight:700,color:P.dim,textTransform:"uppercase",letterSpacing:1.5}}>{match.court.name}</span>
          <button style={{background:"none",border:"none",color:P.dim,cursor:"pointer",padding:4,display:"flex"}} onClick={onClose}><IconX/></button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
          <div style={{flex:1,padding:12,borderRadius:10,border:"2px solid "+(sel===1?P.olive:P.border),background:sel===1?"rgba(148,180,135,0.12)":P.card,textAlign:"center",opacity:sel===1?1:0.4}}><span style={{display:"block",fontSize:14,fontWeight:700}}>{t1n}</span></div>
          <span style={{fontSize:12,color:P.dim,fontWeight:700}}>vs</span>
          <div style={{flex:1,padding:12,borderRadius:10,border:"2px solid "+(sel===2?P.olive:P.border),background:sel===2?"rgba(148,180,135,0.12)":P.card,textAlign:"center",opacity:sel===2?1:0.4}}><span style={{display:"block",fontSize:14,fontWeight:700}}>{t2n}</span></div>
        </div>
        <p style={{fontSize:13,color:P.dim,marginBottom:12}}>Punkty dla <strong style={{color:"#fff"}}>{sel===1?t1n:t2n}</strong>:</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
          {balls.map(v=><button key={v} className="ball" onClick={()=>onSubmit(sel===1?v:maxPoints-v)} style={{width:46,height:46,borderRadius:"50%",border:"2px solid "+P.border,background:P.card,color:"#fff",fontSize:15,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all 0.1s",fontVariantNumeric:"tabular-nums"}}>{v}</button>)}
        </div>
      </div>
    </div>);
}

// ─── App ───────────────────────────────────────────────────────────────
function App(){
  const[phase,setPhase]=useState("loading");
  const[tournament,setTournament]=useState(null);
  const[setup,setSetup]=useState({name:"",players:[],courts:[{id:gid(),name:"Kort 1"}],maxPoints:"21",byePoints:"11"});
  const[npn,setNpn]=useState("");
  const[modal,setModal]=useState(null);
  const ref=useRef(null);
  const nv=v=>{const n=parseInt(v);return isNaN(n)?0:n};

  useEffect(()=>{const s=loadD();if(s&&s.phase){if(s.phase==="tournament"||s.phase==="finished"){setTournament(s);setPhase(s.phase)}else{if(s.setupData)setSetup(s.setupData);setPhase("setup")}}else setPhase("setup")},[]);
  useEffect(()=>{if(phase==="loading")return;if(phase==="setup")saveD({phase:"setup",setupData:setup});else if(tournament)saveD({...tournament,phase})},[phase,setup,tournament]);

  const addP=()=>{const name=npn.trim();if(!name)return;if(setup.players.some(p=>p.name.toLowerCase()===name.toLowerCase()))return;setSetup(d=>({...d,players:[...d.players,{id:gid(),name}]}));setNpn("");setTimeout(()=>ref.current?.focus(),50)};
  const playerDup=npn.trim()&&setup.players.some(p=>p.name.toLowerCase()===npn.trim().toLowerCase());
  const remP=id=>setSetup(d=>({...d,players:d.players.filter(p=>p.id!==id)}));
  const addC=()=>{const baseName="Kort ";let num=setup.courts.length+1;const existing=setup.courts.map(c=>c.name.toLowerCase());while(existing.includes((baseName+num).toLowerCase()))num++;setSetup(d=>({...d,courts:[...d.courts,{id:gid(),name:baseName+num}]}))};
  const remC=id=>setSetup(d=>({...d,courts:d.courts.filter(c=>c.id!==id)}));
  const updC=(id,name)=>setSetup(d=>({...d,courts:d.courts.map(c=>c.id===id?{...c,name}:c)}));
  const courtDups=setup.courts.map((c,i)=>{const name=c.name.trim().toLowerCase();if(!name)return false;return setup.courts.some((other,j)=>j!==i&&other.name.trim().toLowerCase()===name)});
  const hasCourtDups=courtDups.some(Boolean);
  const canStart=setup.players.length>=4&&setup.courts.length>=1&&nv(setup.maxPoints)>0&&!hasCourtDups;

  const startT=()=>{if(!canStart)return;const rounds=generateRounds(setup.players,setup.courts);const mp=nv(setup.maxPoints),bp=nv(setup.byePoints);const t={phase:"tournament",name:setup.name||"Turniej Americano",players:dc(setup.players),courts:dc(setup.courts),maxPoints:mp,byePoints:bp,rounds,scores:{},stats:{},currentRound:0};setup.players.forEach(p=>{t.scores[p.id]=0;t.stats[p.id]={w:0,d:0,l:0}});setTournament(t);setPhase("tournament")};

  const openM=(ri,mi,th)=>{const m=tournament.rounds[ri].matches[mi];if(phase==="finished")return;if(m.completed){resetAndOpen(ri,mi,th);return}setModal({ri,mi,match:m,th})};

  const resetAndOpen=(ri,mi,th)=>{setTournament(prev=>{const t=dc(prev);const m=t.rounds[ri].matches[mi];if(!m.completed)return t;const s1=m.score1,s2=m.score2;
    m.team1.forEach(p=>t.scores[p.id]-=s1);m.team2.forEach(p=>t.scores[p.id]-=s2);
    if(s1>s2){m.team1.forEach(p=>t.stats[p.id].w--);m.team2.forEach(p=>t.stats[p.id].l--)}
    else if(s2>s1){m.team2.forEach(p=>t.stats[p.id].w--);m.team1.forEach(p=>t.stats[p.id].l--)}
    else{m.team1.forEach(p=>t.stats[p.id].d--);m.team2.forEach(p=>t.stats[p.id].d--)}
    const rd=t.rounds[ri];if(rd.completed)rd.byePlayers.forEach(p=>t.scores[p.id]-=t.byePoints);
    m.score1=null;m.score2=null;m.completed=false;rd.completed=false;
    setTimeout(()=>setModal({ri,mi,match:t.rounds[ri].matches[mi],th}),0);return t})};

  const submitS=(s1)=>{if(!modal)return;const{ri,mi}=modal;
    setTournament(prev=>{const t=dc(prev);const m=t.rounds[ri].matches[mi];const v1=Math.max(0,Math.min(t.maxPoints,s1)),v2=t.maxPoints-v1;
    m.score1=v1;m.score2=v2;m.completed=true;
    m.team1.forEach(p=>t.scores[p.id]=(t.scores[p.id]||0)+v1);m.team2.forEach(p=>t.scores[p.id]=(t.scores[p.id]||0)+v2);
    if(v1>v2){m.team1.forEach(p=>t.stats[p.id].w++);m.team2.forEach(p=>t.stats[p.id].l++)}
    else if(v2>v1){m.team2.forEach(p=>t.stats[p.id].w++);m.team1.forEach(p=>t.stats[p.id].l++)}
    else{m.team1.forEach(p=>t.stats[p.id].d++);m.team2.forEach(p=>t.stats[p.id].d++)}
    const rd=t.rounds[ri];if(rd.matches.every(m=>m.completed)){rd.completed=true;rd.byePlayers.forEach(p=>t.scores[p.id]=(t.scores[p.id]||0)+t.byePoints);if(ri+1<t.rounds.length)t.currentRound=ri+1}
    return t});setModal(null)};

  const finishT=()=>{setPhase("finished");setTournament(p=>({...p,phase:"finished"}))};
  const newT=()=>{clearD();setTournament(null);setSetup({name:"",players:[],courts:[{id:gid(),name:"Kort 1"}],maxPoints:"21",byePoints:"11"});setPhase("setup")};
  const getRank=()=>{if(!tournament)return[];return tournament.players.map(p=>({...p,points:tournament.scores[p.id]||0,stats:tournament.stats[p.id]||{w:0,d:0,l:0}})).sort((a,b)=>b.points!==a.points?b.points-a.points:b.stats.w-a.stats.w)};

  const sI={width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid "+P.border,background:P.mid,color:P.text,fontSize:15,outline:"none",boxSizing:"border-box",marginBottom:8};
  const sL={display:"block",fontSize:11,fontWeight:600,color:P.dim,marginBottom:8,textTransform:"uppercase",letterSpacing:1.5};

  if(phase==="loading")return<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh"}}><LogoSmall width={48}/><p style={{marginTop:16,fontSize:14,color:P.dim,fontFamily:"monospace"}}>Ładowanie...</p></div>;

  if(phase==="setup")return(
    <div style={{minHeight:"100vh"}}><div style={{maxWidth:560,margin:"0 auto",padding:"20px 20px"}}>
      <div style={{textAlign:"center",marginBottom:14}}><GardenLogo width={200}/><div style={{height:12}}/><h2 style={{fontSize:15,fontWeight:300,color:P.dim,letterSpacing:5,textTransform:"uppercase"}}>Turniej Americano</h2></div>
      <div style={{marginBottom:24}}><label style={sL}>Nazwa turnieju</label><input style={sI} value={setup.name} onChange={e=>setSetup(d=>({...d,name:e.target.value}))} placeholder="np. Turniej Weekendowy"/></div>
      <div style={{display:"flex",gap:12,marginBottom:24}}>
        <div style={{flex:1}}><label style={sL}>Punkty w meczu</label><input style={sI} type="number" min="1" value={setup.maxPoints} onChange={e=>setSetup(d=>({...d,maxPoints:e.target.value}))}/></div>
        <div style={{flex:1}}><label style={sL}>Punkty za pauzę</label><input style={sI} type="number" min="0" value={setup.byePoints} onChange={e=>setSetup(d=>({...d,byePoints:e.target.value}))}/></div>
      </div>
      <div style={{marginBottom:24}}>
        <label style={sL}>Gracze ({setup.players.length})</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:10}}>{setup.players.map(p=><div key={p.id} style={{display:"flex",alignItems:"center",gap:6,background:P.card,border:"1px solid "+P.border,borderRadius:20,padding:"6px 14px",fontSize:14}}><span>{p.name}</span><button style={{background:"none",border:"none",color:P.dim,cursor:"pointer",padding:0,display:"flex"}} onClick={()=>remP(p.id)}><IconX/></button></div>)}</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}><input ref={ref} style={{...sI,flex:1,marginBottom:0,...(playerDup?{borderColor:"#e07060"}:{})}} value={npn} onChange={e=>setNpn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addP()} placeholder="Imię gracza"/><button style={{display:"flex",alignItems:"center",gap:6,padding:"10px 18px",background:playerDup?"#555":P.olive,color:playerDup?"#999":P.dark,border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:playerDup?"not-allowed":"pointer",whiteSpace:"nowrap"}} disabled={playerDup} onClick={addP}><IconPlus/> Dodaj</button></div>
        {setup.players.length>0&&setup.players.length<4&&<p style={{color:P.olive,fontSize:12,marginTop:4}}>Minimum 4 graczy</p>}
        {playerDup&&<p style={{color:"#e07060",fontSize:12,marginTop:4}}>Gracz o tej nazwie już istnieje</p>}
      </div>
      <div style={{marginBottom:24}}>
        <label style={sL}>Korty ({setup.courts.length})</label>
        {setup.courts.map((c,ci)=><div key={c.id} style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}><input style={{...sI,flex:1,marginBottom:0,...(courtDups[ci]?{borderColor:"#e07060"}:{})}} value={c.name} onChange={e=>updC(c.id,e.target.value)}/>{setup.courts.length>1&&<button style={{background:"none",border:"none",color:P.dim,cursor:"pointer",padding:4,display:"flex"}} onClick={()=>remC(c.id)}><IconX/></button>}</div>)}
        {hasCourtDups&&<p style={{color:"#e07060",fontSize:12,marginTop:2,marginBottom:6}}>Nazwy kortów muszą być unikatowe</p>}
        <button style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",background:"transparent",color:P.olive,border:"1px dashed "+P.olive,borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",marginTop:8}} onClick={addC}><IconPlus/> Dodaj kort</button>
      </div>
      <button style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"14px 24px",background:"linear-gradient(135deg,"+P.olive+","+P.oliveDark+")",color:P.dark,border:"none",borderRadius:12,fontSize:17,fontWeight:800,cursor:canStart?"pointer":"not-allowed",opacity:canStart?1:0.4}} disabled={!canStart} onClick={startT}><IconPlay/> Rozpocznij turniej</button>
    </div></div>);

  if((phase==="tournament"||phase==="finished")&&tournament){
    const rank=getRank(), cr=tournament.rounds.filter(r=>r.completed).length, fin=phase==="finished";
    return(<div style={{minHeight:"100vh"}}>
      {modal&&<ScoreModal match={modal.match} maxPoints={tournament.maxPoints} teamHint={modal.th} onSubmit={submitS} onClose={()=>setModal(null)}/>}
      <div style={{background:P.mid,borderBottom:"1px solid "+P.border,padding:"10px 20px",position:"sticky",top:0,zIndex:50}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}><LogoSmall width={36}/><span style={{fontSize:15,fontWeight:600}}>{tournament.name}</span></div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:13,color:P.dim,background:P.card,padding:"4px 12px",borderRadius:12,fontWeight:700}}>{cr}/{tournament.rounds.length} rund</span>
            {!fin&&<button style={{padding:"6px 16px",background:"#c0392b",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}} onClick={finishT}>Zakończ turniej</button>}
            {fin&&<button style={{padding:"6px 16px",background:P.olive,color:P.dark,border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}} onClick={newT}>Nowy turniej</button>}
          </div>
        </div>
      </div>
      {fin&&rank.length>0&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,padding:"24px 20px",background:"linear-gradient(135deg,"+P.mid+" 0%,#003d20 100%)",borderBottom:"1px solid "+P.border}}>
        <div style={{fontSize:48}}>🏆</div><div><div style={{fontSize:12,color:P.olive,textTransform:"uppercase",letterSpacing:2,fontWeight:700}}>Zwycięzca</div><div style={{fontSize:28,fontWeight:800,margin:"2px 0",color:"#fff"}}>{rank[0].name}</div><div style={{fontSize:16,color:P.dim}}>{rank[0].points} pkt • Z-R-P {rank[0].stats.w}-{rank[0].stats.d}-{rank[0].stats.l}</div></div>
      </div>}
      <div className="main-grid" style={{maxWidth:1200,margin:"0 auto",padding:20,display:"grid",gridTemplateColumns:"340px 1fr",gap:20,alignItems:"start"}}>
        <div style={{background:P.mid,borderRadius:12,border:"1px solid "+P.border,overflow:"hidden"}}>
          <h2 style={{fontSize:12,fontWeight:700,color:P.dim,textTransform:"uppercase",letterSpacing:2,padding:"14px 16px",margin:0,borderBottom:"1px solid "+P.border}}>Ranking</h2>
          <div>
            <div style={{display:"flex",alignItems:"center",padding:"8px 16px",borderBottom:"1px solid "+P.border,fontSize:10,color:P.dim,textTransform:"uppercase",letterSpacing:1.5}}><span style={{width:32,textAlign:"center"}}>#</span><span style={{flex:1}}>Gracz</span><span style={{width:70,textAlign:"center"}}>Z-R-P</span><span style={{width:48,textAlign:"right"}}>Pkt</span></div>
            {rank.map((p,i)=><div key={p.id} style={{display:"flex",alignItems:"center",padding:"10px 16px",borderBottom:"1px solid "+P.border,...(i===0&&fin?{background:"rgba(212,168,67,0.1)"}:i===1&&fin?{background:"rgba(148,163,184,0.06)"}:i===2&&fin?{background:"rgba(192,138,69,0.06)"}:{})}}>
              <span style={{width:32,textAlign:"center",fontSize:15,fontWeight:700}}>{i===0&&fin?"🥇":i===1&&fin?"🥈":i===2&&fin?"🥉":i+1}</span>
              <span style={{flex:1,fontSize:14,fontWeight:600}}>{p.name}</span>
              <span style={{width:70,textAlign:"center",fontSize:13,fontWeight:700,fontVariantNumeric:"tabular-nums"}}><span style={{color:P.olive}}>{p.stats.w}</span>-<span style={{color:P.dim}}>{p.stats.d}</span>-<span style={{color:"#d46b5b"}}>{p.stats.l}</span></span>
              <span style={{width:48,textAlign:"right",fontSize:16,fontWeight:800,fontVariantNumeric:"tabular-nums",color:P.olive}}>{p.points}</span>
            </div>)}
          </div>
        </div>
        <div style={{background:P.mid,borderRadius:12,border:"1px solid "+P.border,overflow:"hidden"}}>
          <h2 style={{fontSize:12,fontWeight:700,color:P.dim,textTransform:"uppercase",letterSpacing:2,padding:"14px 16px",margin:0,borderBottom:"1px solid "+P.border}}>Rundy</h2>
          <div style={{padding:16,display:"flex",flexDirection:"column",gap:16,maxHeight:"calc(100vh - 140px)",overflowY:"auto"}}>
            {tournament.rounds.map((rd,ri)=><div key={rd.id} style={{background:P.card,borderRadius:10,border:"1px solid "+(ri===tournament.currentRound&&!fin&&!rd.completed?P.olive:P.border),padding:14,opacity:rd.completed?0.7:1}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontSize:15,fontWeight:700}}>Runda {rd.number}</span>
                {rd.completed&&<span style={{display:"flex",alignItems:"center",gap:4,fontSize:12,color:P.olive,fontWeight:600}}><IconCheck/> Ukończona</span>}
                {ri===tournament.currentRound&&!rd.completed&&!fin&&<span style={{fontSize:12,color:P.dark,fontWeight:700,background:P.olive,padding:"2px 10px",borderRadius:8}}>Trwa</span>}
              </div>
              {rd.matches.map((m,mi)=>{const cc=!fin;
                const ts=(w,l)=>({flex:1,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",borderRadius:8,border:"1px solid "+P.border,background:P.card,transition:"all 0.15s",...(cc?{cursor:"pointer"}:{}),...(m.completed?(w?{borderColor:P.olive+"88",background:"rgba(148,180,135,0.1)"}:l?{borderColor:"#c0392b44",background:"rgba(192,57,43,0.05)"}:{borderColor:"#d4a84366",background:"rgba(212,168,67,0.05)"}):{}),});
                return<div key={m.id} style={{background:P.mid,borderRadius:8,padding:12,marginBottom:8,border:"1px solid "+P.border}}>
                  <div style={{fontSize:11,color:P.dim,textTransform:"uppercase",letterSpacing:1,marginBottom:8,fontWeight:700}}>{m.court.name}</div>
                  <div style={{display:"flex",alignItems:"stretch",gap:8}}>
                    <div className={cc?"team-click":""} style={ts(m.score1>m.score2,m.score1<m.score2)} onClick={()=>cc&&openM(ri,mi,1)}><span style={{fontSize:13,fontWeight:600}}>{m.team1.map(p=>p.name).join(" & ")}</span>{m.completed&&<span style={{fontSize:20,fontWeight:800,fontVariantNumeric:"tabular-nums",color:P.olive,marginLeft:8}}>{m.score1}</span>}</div>
                    <span style={{display:"flex",alignItems:"center",fontSize:11,color:P.dim,fontWeight:700}}>vs</span>
                    <div className={cc?"team-click":""} style={ts(m.score2>m.score1,m.score2<m.score1)} onClick={()=>cc&&openM(ri,mi,2)}><span style={{fontSize:13,fontWeight:600}}>{m.team2.map(p=>p.name).join(" & ")}</span>{m.completed&&<span style={{fontSize:20,fontWeight:800,fontVariantNumeric:"tabular-nums",color:P.olive,marginLeft:8}}>{m.score2}</span>}</div>
                  </div>
                  {!m.completed&&!fin&&<div style={{fontSize:11,color:P.dim,textAlign:"center",marginTop:6,fontStyle:"italic"}}>Kliknij parę, aby podać wynik</div>}
                </div>})}
              {rd.byePlayers.length>0&&<div style={{marginTop:8,padding:"8px 12px",background:"rgba(148,180,135,0.06)",borderRadius:6,fontSize:13,color:P.dim,border:"1px dashed rgba(148,180,135,0.27)"}}>Pauza: {rd.byePlayers.map(p=>p.name).join(", ")}{tournament.byePoints>0&&<span style={{opacity:0.6}}> (+{tournament.byePoints} pkt)</span>}</div>}
            </div>)}
          </div>
        </div>
      </div>
    </div>);
  }
  return null;
}
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
