    // ─── ALGORITHMS ────────────────────────────────────────────────────────
    function genAmericano(players, courts) {
        const n = players.length, pk = (a, b) => a < b ? a + "|" + b : b + "|" + a;
        const ac = Math.min(courts.length, Math.floor(n / 4)), apc = ac * 4, ppr = ac * 2;
        const apk = [];
        for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) apk.push(pk(players[i].id, players[j].id));
        const mr = ppr > 0 ? Math.ceil(apk.length / ppr) : 1;
        let best = null, bestMP = Infinity;
        const ta = n <= 12 ? 15 : 8;
        for (let fa = 0; fa < ta; fa++) {
            const pc = new Map(), oc = new Map(), bc = new Map(), lb = new Map();
            players.forEach(p => {
                bc.set(p.id, 0);
                lb.set(p.id, -999)
            });
            const gp = (a, b) => pc.get(pk(a, b)) || 0, go = (a, b) => oc.get(pk(a, b)) || 0;
            const ip = (a, b) => pc.set(pk(a, b), gp(a, b) + 1), io = (a, b) => oc.set(pk(a, b), go(a, b) + 1);
            const rds = [];
            for (let r = 0; r < mr + 5; r++) {
                const s = [...players].sort((a, b) => {
                    const aC = lb.get(a.id) === r - 1 ? 1 : 0, bC = lb.get(b.id) === r - 1 ? 1 : 0;
                    if (aC !== bC) return bC - aC;
                    const aB = bc.get(a.id), bB = bc.get(b.id);
                    if (aB !== bB) return bB - aB;
                    return Math.random() - .5
                });
                const ap = s.slice(0, apc), bp = s.slice(apc);
                bp.forEach(p => {
                    bc.set(p.id, bc.get(p.id) + 1);
                    lb.set(p.id, r)
                });
                let bM = null, bS = Infinity;
                const at = n <= 12 ? 2000 : 800;
                for (let a = 0; a < at; a++) {
                    const sh = [...ap].sort(() => Math.random() - .5);
                    let ts = 0;
                    const ms = [];
                    for (let g = 0; g < ac; g++) {
                        const f = sh.slice(g * 4, g * 4 + 4);
                        const sp = [[f[0], f[1], f[2], f[3]], [f[0], f[2], f[1], f[3]], [f[0], f[3], f[1], f[2]]];
                        let bs = Infinity, b1, b2;
                        for (const [a, b, c, d] of sp) {
                            const ps = gp(a.id, b.id) + gp(c.id, d.id);
                            const os = go(a.id, c.id) + go(a.id, d.id) + go(b.id, c.id) + go(b.id, d.id);
                            const sc = ps * ps * 50 + os * os;
                            if (sc < bs) {
                                bs = sc;
                                b1 = [a, b];
                                b2 = [c, d]
                            }
                        }
                        ts += bs;
                        ms.push({t1: b1, t2: b2, court: courts[g]})
                    }
                    if (ts < bS) {
                        bS = ts;
                        bM = ms
                    }
                    if (ts === 0) break
                }
                if (!bM) break;
                for (const m of bM) {
                    ip(m.t1[0].id, m.t1[1].id);
                    ip(m.t2[0].id, m.t2[1].id);
                    for (const a of m.t1) for (const b of m.t2) io(a.id, b.id)
                }
                rds.push({
                    id: gid(),
                    number: rds.length + 1,
                    matches: bM.map(m => ({
                        id: gid(),
                        court: m.court,
                        team1: m.t1.map(p => ({id: p.id, name: p.name})),
                        team2: m.t2.map(p => ({id: p.id, name: p.name})),
                        score1: null,
                        score2: null,
                        completed: false
                    })),
                    byePlayers: bp.map(p => ({id: p.id, name: p.name})),
                    completed: false
                });
                if (apk.every(k => (pc.get(k) || 0) > 0)) break;
                if (rds.length >= mr + 3) break
            }
            let mx = 0;
            for (const [, c] of pc) if (c > mx) mx = c;
            if (mx < bestMP) {
                bestMP = mx;
                best = rds;
                if (mx <= 1) break
            }
        }
        return best || [];
    }

    function genFixedPairs(pairs, courts) {
        // pairs: [{id,p1:{id,name},p2:{id,name}}]
        const n = pairs.length, ac = Math.min(courts.length, Math.floor(n / 2));
        const pk = (a, b) => a < b ? a + "|" + b : b + "|" + a;
        const oc = new Map(), bc = new Map(), lb = new Map();
        pairs.forEach(p => {
            bc.set(p.id, 0);
            lb.set(p.id, -999)
        });
        const go = (a, b) => oc.get(pk(a, b)) || 0;
        const io = (a, b) => oc.set(pk(a, b), go(a, b) + 1);
        const allOppKeys = [];
        for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) allOppKeys.push(pk(pairs[i].id, pairs[j].id));
        const mr = ac > 0 ? Math.ceil(allOppKeys.length / ac) : 1;
        const rds = [];
        for (let r = 0; r < mr + 5; r++) {
            const s = [...pairs].sort((a, b) => {
                const aC = lb.get(a.id) === r - 1 ? 1 : 0, bC = lb.get(b.id) === r - 1 ? 1 : 0;
                if (aC !== bC) return bC - aC;
                const aB = bc.get(a.id), bB = bc.get(b.id);
                if (aB !== bB) return bB - aB;
                return Math.random() - .5
            });
            const active = s.slice(0, ac * 2), bye = s.slice(ac * 2);
            bye.forEach(p => {
                bc.set(p.id, bc.get(p.id) + 1);
                lb.set(p.id, r)
            });
            let bM = null, bS = Infinity;
            for (let a = 0; a < 1000; a++) {
                const sh = [...active].sort(() => Math.random() - .5);
                let ts = 0;
                const ms = [];
                for (let g = 0; g < ac; g++) {
                    const p1 = sh[g * 2], p2 = sh[g * 2 + 1];
                    const os = go(p1.id, p2.id);
                    ts += os * os;
                    ms.push({t1: p1, t2: p2, court: courts[g]})
                }
                if (ts < bS) {
                    bS = ts;
                    bM = ms
                }
                if (ts === 0) break
            }
            if (!bM) break;
            for (const m of bM) io(m.t1.id, m.t2.id);
            rds.push({
                id: gid(),
                number: rds.length + 1,
                matches: bM.map(m => ({
                    id: gid(),
                    court: m.court,
                    team1: [{id: m.t1.p1.id, name: m.t1.p1.name}, {id: m.t1.p2.id, name: m.t1.p2.name}],
                    team2: [{id: m.t2.p1.id, name: m.t2.p1.name}, {id: m.t2.p2.id, name: m.t2.p2.name}],
                    score1: null,
                    score2: null,
                    completed: false
                })),
                byePlayers: bye.flatMap(p => [{id: p.p1.id, name: p.p1.name}, {id: p.p2.id, name: p.p2.name}]),
                completed: false
            });
            if (allOppKeys.every(k => (oc.get(k) || 0) > 0)) break;
            if (rds.length >= mr + 3) break
        }
        return rds;
    }

    function genMexicanoRound(players, courts, scores, prevPartners, roundNum, randomRounds) {
        const n = players.length, ac = Math.min(courts.length, Math.floor(n / 4)), apc = ac * 4;
        const isRandom = roundNum <= randomRounds;
        const pk = (a, b) => a < b ? a + "|" + b : b + "|" + a;
        const gpp = (a, b) => prevPartners.get(pk(a, b)) || 0;
        let sorted;
        if (isRandom) {
            sorted = [...players].sort(() => Math.random() - .5)
        } else {
            sorted = [...players].sort((a, b) => {
                const d = (scores[b.id] || 0) - (scores[a.id] || 0);
                return d !== 0 ? d : Math.random() - .5
            })
        }
        const active = sorted.slice(0, apc), bye = sorted.slice(apc);
        const matches = [];
        for (let g = 0; g < ac; g++) {
            const p = active.slice(g * 4, g * 4 + 4);
            let t1i, t2i;
            if (isRandom) {
                // Random rounds: try to avoid repeat partners
                const options = [{t1: [0, 2], t2: [1, 3]}, {t1: [0, 3], t2: [1, 2]}, {t1: [0, 1], t2: [2, 3]}];
                let bestOpt = options[0], bestPen = Infinity;
                for (const opt of options) {
                    const pen = gpp(p[opt.t1[0]].id, p[opt.t1[1]].id) + gpp(p[opt.t2[0]].id, p[opt.t2[1]].id);
                    if (pen < bestPen) {
                        bestPen = pen;
                        bestOpt = opt
                    }
                    if (pen === 0) break;
                }
                t1i = bestOpt.t1;
                t2i = bestOpt.t2;
            } else {
                // Ranking rounds: ALWAYS 1+3 vs 2+4, no exceptions
                t1i = [0, 2];
                t2i = [1, 3];
            }
            const t1 = t1i.map(i => ({id: p[i].id, name: p[i].name}));
            const t2 = t2i.map(i => ({id: p[i].id, name: p[i].name}));
            matches.push({
                id: gid(),
                court: courts[g],
                team1: t1,
                team2: t2,
                score1: null,
                score2: null,
                completed: false
            });
            prevPartners.set(pk(t1[0].id, t1[1].id), (gpp(t1[0].id, t1[1].id)) + 1);
            prevPartners.set(pk(t2[0].id, t2[1].id), (gpp(t2[0].id, t2[1].id)) + 1);
        }
        return {
            id: gid(),
            number: roundNum,
            matches,
            byePlayers: bye.map(p => ({id: p.id, name: p.name})),
            completed: false
        };
    }

                        <div style={{display: "flex", gap: 8, alignItems: "center"}}><input ref={ref} style={{
                            ...sI,
                            flex: 1,
                            marginBottom: 0, ...(playerDup ? {borderColor: T.err} : {})
                        }} value={npn} onChange={e => setNpn(e.target.value)}
                                                                                            onKeyDown={e => e.key === "Enter" && addP()}
                                                                                            placeholder="Imię gracza"/>
                            <button style={{
                                display: "flex",
                                alignItems: "center",
                                gap: 6,
                                padding: "10px 18px",
                                background: playerDup ? T.errBg : T.olive,
                                color: playerDup ? T.errT : T.dark,
                                border: "none",
                                borderRadius: 8,
                                fontSize: 14,
                                fontWeight: 700,
                                cursor: playerDup ? "not-allowed" : "pointer",
                                whiteSpace: "nowrap"
                            }} disabled={playerDup} onClick={addP}><IconPlus/> Dodaj
                            </button>
                        </div>
                        {setup.players.length > 0 && setup.players.length < 4 &&
                            <p style={{color: T.olive, fontSize: 12, marginTop: 4}}>Minimum 4 graczy</p>}
                        {playerDup &&
                            <p style={{color: T.err, fontSize: 12, marginTop: 4}}>Gracz o tej nazwie już istnieje</p>}
                    </div>}

                    {/* Pairs (fixed pairs mode) */}
                    {isPairs && <div style={{marginBottom: 24}}>
                        <label style={sL}>Pary ({setup.pairs.length})</label>
                        <div style={{
                            display: "flex",
                            flexDirection: "column",
                            gap: 8,
                            marginBottom: 10
                        }}>{setup.pairs.map(p => <div key={p.id} style={{
                            display: "flex",
                            alignItems: "center",
                            gap: 8,
                            background: T.card,
                            border: "1px solid " + T.border,
                            borderRadius: 10,
                            padding: "8px 14px",
                            fontSize: 14
                        }}><span style={{fontWeight: 600}}>{p.p1.name}</span><span style={{color: T.dim}}>&</span><span
                            style={{fontWeight: 600}}>{p.p2.name}</span>
                            <button style={{
                                marginLeft: "auto",
                                background: "none",
                                border: "none",
                                color: T.dim,
                                cursor: "pointer",
                                display: "flex"
                            }} onClick={() => remPair(p.id)}><IconX/></button>
                        </div>)}</div>
                        <div style={{display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap"}}>
                            <input ref={ref1} style={{
                                ...sI,
                                flex: 1,
                                minWidth: 100,
                                marginBottom: 0, ...(pairDup ? {borderColor: T.err} : {})
                            }} value={np1} onChange={e => setNp1(e.target.value)} placeholder="Gracz 1"/>
                            <span style={{color: T.dim, fontWeight: 700}}>&</span>
                            <input style={{
                                ...sI,
                                flex: 1,
                                minWidth: 100,
                                marginBottom: 0, ...(pairDup ? {borderColor: T.err} : {})
                            }} value={np2} onChange={e => setNp2(e.target.value)}
                                   onKeyDown={e => e.key === "Enter" && addPair()} placeholder="Gracz 2"/>
                            <button style={{
                                display: "flex",
                                alignItems: "center",
                                gap: 6,
                                padding: "10px 18px",
                                background: pairDup ? T.errBg : T.olive,
                                color: pairDup ? T.errT : T.dark,
                                border: "none",
                                borderRadius: 8,
                                fontSize: 14,
                                fontWeight: 700,
                                cursor: pairDup ? "not-allowed" : "pointer",
                                whiteSpace: "nowrap"
                            }} disabled={pairDup} onClick={addPair}><IconPlus/> Dodaj
                            </button>
                        </div>
                        {setup.pairs.length > 0 && setup.pairs.length < 2 &&
                            <p style={{color: T.olive, fontSize: 12, marginTop: 4}}>Minimum 2 pary</p>}
                        {pairDup &&
                            <p style={{color: T.err, fontSize: 12, marginTop: 4}}>Nazwy graczy muszą być unikatowe</p>}
                    </div>}

                    {/* Courts */}
                    <div style={{marginBottom: 24}}>
                        <label style={sL}>Korty ({setup.courts.length})</label>
                        {setup.courts.map((c, ci) => <div key={c.id} style={{
                            display: "flex",
                            gap: 8,
                            alignItems: "center",
                            marginBottom: 6
                        }}><input
                            style={{...sI, flex: 1, marginBottom: 0, ...(courtDups[ci] ? {borderColor: T.err} : {})}}
                            value={c.name} onChange={e => updC(c.id, e.target.value)}/>{setup.courts.length > 1 &&
                            <button style={{
                                background: "none",
                                border: "none",
                                color: T.dim,
                                cursor: "pointer",
                                padding: 4,
                                display: "flex"
                            }} onClick={() => remC(c.id)}><IconX/></button>}</div>)}
                        {hasCourtDups &&
                            <p style={{color: T.err, fontSize: 12, marginTop: 2, marginBottom: 6}}>Nazwy kortów muszą
                                być unikatowe</p>}
                        <button style={{
                            display: "flex",
                            alignItems: "center",
                            gap: 6,
                            padding: "8px 16px",
                            background: "transparent",
                            color: T.olive,
                            border: "1px dashed " + T.olive,
                            borderRadius: 8,
                            fontSize: 13,
                            fontWeight: 600,
                            cursor: "pointer",
                            marginTop: 8
                        }} onClick={addC}><IconPlus/> Dodaj kort
                        </button>
                    </div>

                    <button style={{
                        width: "100%",
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        gap: 10,
                        padding: "14px 24px",
                        background: "linear-gradient(135deg," + T.olive + "," + T.oliveDark + ")",
                        color: isDark ? T.dark : "#fff",
                        border: "none",
                        borderRadius: 12,
                        fontSize: 17,
                        fontWeight: 800,
                        cursor: canStart ? "pointer" : "not-allowed",
                        opacity: canStart ? 1 : .4
                    }} disabled={!canStart} onClick={startT}><IconPlay/> Rozpocznij turniej
                    </button>
                </div>
            </div>);

        // ── TOURNAMENT / FINISHED ──
        if ((phase === "tournament" || phase === "finished") && tournament) {
            const rank = getRank(), cr = tournament.rounds.filter(r => r.completed).length, fin = phase === "finished";
            const modeLabel = modeNames[tournament.mode] || "Turniej";
            return (<div style={{minHeight: "100vh", background: T.dark, color: T.text}}>
                {modal &&
                    <SM match={modal.match} maxPoints={tournament.maxPoints} teamHint={modal.th} onSubmit={submitS}
                        onClose={() => setModal(null)} T={T}/>}
                <div style={{
                    background: T.mid,
                    borderBottom: "1px solid " + T.border,
                    padding: "10px 20px",
                    position: "sticky",
                    top: 0,
                    zIndex: 50
                }}>
                    <div style={{
                        maxWidth: 1200,
                        margin: "0 auto",
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "space-between",
                        flexWrap: "wrap",
                        gap: 8
                    }}>
                        <div style={{display: "flex", alignItems: "center", gap: 12}}><LS width={36} T={T}/>
                            <div><span
                                style={{fontSize: 15, fontWeight: 600, display: "block"}}>{tournament.name}</span><span
                                style={{fontSize: 11, color: T.dim}}>{modeLabel}</span></div>
                        </div>
                        <div style={{display: "flex", alignItems: "center", gap: 10}}>
                            <TT isDark={isDark} onToggle={tog} T={T}/>
                            <span style={{
                                fontSize: 13,
                                color: T.dim,
                                background: T.card,
                                padding: "4px 12px",
                                borderRadius: 12,
                                fontWeight: 700
                            }}>{cr}{tournament.mode !== "mexicano" ? "/" + tournament.rounds.length : ""} rund</span>
                            {!fin && <button style={{
                                padding: "6px 16px",
                                background: "#c0392b",
                                color: "#fff",
                                border: "none",
                                borderRadius: 8,
                                fontSize: 13,
                                fontWeight: 700,
                                cursor: "pointer"
                            }} onClick={finishT}>Zakończ turniej</button>}
                            {fin && <button style={{
                                padding: "6px 16px",
                                background: T.olive,
                                color: isDark ? T.dark : "#fff",
                                border: "none",
                                borderRadius: 8,
                                fontSize: 13,
                                fontWeight: 700,
                                cursor: "pointer"
                            }} onClick={newT}>Nowy turniej</button>}
                        </div>
                    </div>
                </div>
                {fin && rank.length > 0 && <div style={{
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    gap: 16,
                    padding: "24px 20px",
                    background: T.winGrad,
                    borderBottom: "1px solid " + T.border
                }}>
                    <div style={{fontSize: 48}}>🏆</div>
                    <div>
                        <div style={{
                            fontSize: 12,
                            color: T.olive,
                            textTransform: "uppercase",
                            letterSpacing: 2,
                            fontWeight: 700
                        }}>Zwycięzca
                        </div>
                        <div style={{fontSize: 28, fontWeight: 800, margin: "2px 0"}}>{rank[0].name}</div>
                        <div style={{fontSize: 16, color: T.dim}}>{rank[0].points} pkt •
                            Z-R-P {rank[0].stats.w}-{rank[0].stats.d}-{rank[0].stats.l}</div>
                    </div>
                </div>}
                <div className="mg" style={{
                    maxWidth: 1200,
                    margin: "0 auto",
                    padding: 20,
                    display: "grid",
                    gridTemplateColumns: "340px 1fr",
                    gap: 20,
                    alignItems: "start"
                }}>
                    <div style={{
                        background: T.mid,
                        borderRadius: 12,
                        border: "1px solid " + T.border,
                        overflow: "hidden"
                    }}>
                        <h2 style={{
                            fontSize: 12,
                            fontWeight: 700,
                            color: T.dim,
                            textTransform: "uppercase",
                            letterSpacing: 2,
                            padding: "14px 16px",
                            margin: 0,
                            borderBottom: "1px solid " + T.border
                        }}>Ranking</h2>
                        <div>
                            <div style={{
                                display: "flex",
                                alignItems: "center",
                                padding: "8px 16px",
                                borderBottom: "1px solid " + T.border,
                                fontSize: 10,
                                color: T.dim,
                                textTransform: "uppercase",
                                letterSpacing: 1.5
                            }}><span style={{width: 32, textAlign: "center"}}>#</span><span
                                style={{flex: 1}}>{tournament.mode === "pairs" ? "Para" : "Gracz"}</span><span
                                style={{width: 70, textAlign: "center"}}>Z-R-P</span><span
                                style={{width: 48, textAlign: "right"}}>Pkt</span></div>
                            {rank.map((p, i) => <div key={p.id} style={{
                                display: "flex",
                                alignItems: "center",
                                padding: "10px 16px",
                                borderBottom: "1px solid " + T.border, ...(i === 0 && fin ? {background: "rgba(212,168,67,0.1)"} : i === 1 && fin ? {background: "rgba(148,163,184,0.06)"} : i === 2 && fin ? {background: "rgba(192,138,69,0.06)"} : {})
                            }}>
                                <span style={{
                                    width: 32,
                                    textAlign: "center",
                                    fontSize: 15,
                                    fontWeight: 700
                                }}>{i === 0 && fin ? "🥇" : i === 1 && fin ? "🥈" : i === 2 && fin ? "🥉" : i + 1}</span>
                                <span style={{flex: 1, fontSize: 14, fontWeight: 600}}>{p.name}</span>
                                <span style={{
                                    width: 70,
                                    textAlign: "center",
                                    fontSize: 13,
                                    fontWeight: 700,
                                    fontVariantNumeric: "tabular-nums"
                                }}><span style={{color: T.wW}}>{p.stats.w}</span>-<span
                                    style={{color: T.wD}}>{p.stats.d}</span>-<span
                                    style={{color: T.wL}}>{p.stats.l}</span></span>
                                <span style={{
                                    width: 48,
                                    textAlign: "right",
                                    fontSize: 16,
                                    fontWeight: 800,
                                    fontVariantNumeric: "tabular-nums",
                                    color: T.olive
                                }}>{p.points}</span>
                            </div>)}
                        </div>
                    </div>
                    <div style={{
                        background: T.mid,
                        borderRadius: 12,
                        border: "1px solid " + T.border,
                        overflow: "hidden"
                    }}>
                        <h2 style={{
                            fontSize: 12,
                            fontWeight: 700,
                            color: T.dim,
                            textTransform: "uppercase",
                            letterSpacing: 2,
                            padding: "14px 16px",
                            margin: 0,
                            borderBottom: "1px solid " + T.border
                        }}>Rundy</h2>
                        <div style={{
                            padding: 16,
                            display: "flex",
                            flexDirection: "column",
                            gap: 16,
                            maxHeight: "calc(100vh - 140px)",
                            overflowY: "auto"
                        }}>
                            {tournament.rounds.map((rd, ri) => <div key={rd.id} style={{
                                background: T.card,
                                borderRadius: 10,
                                border: "1px solid " + (ri === tournament.currentRound && !fin && !rd.completed ? T.olive : T.border),
                                padding: 14,
                                opacity: rd.completed ? .7 : 1
                            }}>
                                <div style={{
                                    display: "flex",
                                    alignItems: "center",
                                    justifyContent: "space-between",
                                    marginBottom: 10
                                }}>
                                    <span style={{fontSize: 15, fontWeight: 700}}>Runda {rd.number}</span>
                                    {rd.completed && <span style={{
                                        display: "flex",
                                        alignItems: "center",
                                        gap: 4,
                                        fontSize: 12,
                                        color: T.olive,
                                        fontWeight: 600
                                    }}><IconCheck/> Ukończona</span>}
                                    {ri === tournament.currentRound && !rd.completed && !fin && <span style={{
                                        fontSize: 12,
                                        color: isDark ? T.dark : "#fff",
                                        fontWeight: 700,
                                        background: T.olive,
                                        padding: "2px 10px",
                                        borderRadius: 8
                                    }}>Trwa</span>}
                                </div>
                                {rd.matches.map((m, mi) => {
                                    const cc = !fin;
                                    const ts = (w, l) => ({
                                        flex: 1,
                                        display: "flex",
                                        alignItems: "center",
                                        justifyContent: "space-between",
                                        padding: "10px 12px",
                                        borderRadius: 8,
                                        border: "1px solid " + T.border,
                                        background: T.card,
                                        transition: "all .15s", ...(cc ? {cursor: "pointer"} : {}), ...(m.completed ? (w ? {
                                            borderColor: T.tWBd,
                                            background: T.tWBg
                                        } : l ? {borderColor: T.tLBd, background: T.tLBg} : {
                                            borderColor: T.tDBd,
                                            background: T.tDBg
                                        }) : {}),
                                    });
                                    return <div key={m.id} style={{
                                        background: T.mid,
                                        borderRadius: 8,
                                        padding: 12,
                                        marginBottom: 8,
                                        border: "1px solid " + T.border
                                    }}>
                                        <div style={{
                                            fontSize: 11,
                                            color: T.dim,
                                            textTransform: "uppercase",
                                            letterSpacing: 1,
                                            marginBottom: 8,
                                            fontWeight: 700
                                        }}>{m.court.name}</div>
                                        <div style={{display: "flex", alignItems: "stretch", gap: 8}}>
                                            <div className={cc ? "team-click" : ""}
                                                 style={ts(m.score1 > m.score2, m.score1 < m.score2)}
                                                 onClick={() => cc && openM(ri, mi, 1)}><span style={{
                                                fontSize: 13,
                                                fontWeight: 600
                                            }}>{m.team1.map(p => p.name).join(" & ")}</span>{m.completed && <span
                                                style={{
                                                    fontSize: 20,
                                                    fontWeight: 800,
                                                    fontVariantNumeric: "tabular-nums",
                                                    color: T.olive,
                                                    marginLeft: 8
                                                }}>{m.score1}</span>}</div>
                                            <span style={{
                                                display: "flex",
                                                alignItems: "center",
                                                fontSize: 11,
                                                color: T.dim,
                                                fontWeight: 700
                                            }}>vs</span>
                                            <div className={cc ? "team-click" : ""}
                                                 style={ts(m.score2 > m.score1, m.score2 < m.score1)}
                                                 onClick={() => cc && openM(ri, mi, 2)}><span style={{
                                                fontSize: 13,
                                                fontWeight: 600
                                            }}>{m.team2.map(p => p.name).join(" & ")}</span>{m.completed && <span
                                                style={{
                                                    fontSize: 20,
                                                    fontWeight: 800,
                                                    fontVariantNumeric: "tabular-nums",
                                                    color: T.olive,
                                                    marginLeft: 8
                                                }}>{m.score2}</span>}</div>
                                        </div>
                                        {!m.completed && !fin && <div style={{
                                            fontSize: 11,
                                            color: T.dim,
                                            textAlign: "center",
                                            marginTop: 6,
                                            fontStyle: "italic"
                                        }}>Kliknij parę, aby podać wynik</div>}
                                    </div>
                                })}
                                {rd.byePlayers.length > 0 && <div style={{
                                    marginTop: 8,
                                    padding: "8px 12px",
                                    background: T.byeBg,
                                    borderRadius: 6,
                                    fontSize: 13,
                                    color: T.dim,
                                    border: "1px dashed " + T.byeBd
                                }}>Pauza: {rd.byePlayers.map(p => p.name).join(", ")}{tournament.byePoints > 0 &&
                                    <span style={{opacity: .6}}> (+{tournament.byePoints} pkt)</span>}</div>}
                            </div>)}
                        </div>
                    </div>
                </div>
            </div>);
        }
        return null;
    }

    ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
